const parseScoreToNumber = scoreStr => {
  if (!scoreStr && scoreStr !== 0) return 0;
  const str = scoreStr.toString();
  const parts = str.split('/');
  if (parts.length === 2) {
    return parseInt(parts[0], 10) / parseInt(parts[1], 10);
  }
  return parseFloat(str) || 0;
};
const formatScoreStr = scoreStr => {
  const val = parseScoreToNumber(scoreStr);
  if (Number.isInteger(val)) return val.toString();
  return Number(val.toFixed(2)).toString(); // 小数第2位まで、末尾0除去
};

// 効果音再生
const playSound = (type, enabled) => {
  if (!enabled) return;
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1108, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'pop') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      gain.gain.setValueAtTime(0.05, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    }
  } catch (e) {
    // ユーザーインタラクション前などのエラーは無視
  }
};

// ==========================================
// Mock Socket（バックエンドが無いプレビュー時のフォールバック）
// 実環境では /socket.io/socket.io.js の window.io() を使う
// ==========================================
const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
const evalFrac = (op, aStr, bStr) => {
  let [n1, d1] = aStr.toString().split('/').map(Number);
  if (!d1) d1 = 1;
  let [n2, d2] = bStr.toString().split('/').map(Number);
  if (!d2) d2 = 1;
  let n, d;
  switch (op) {
    case '+':
      n = n1 * d2 + n2 * d1;
      d = d1 * d2;
      break;
    case '-':
      n = n1 * d2 - n2 * d1;
      d = d1 * d2;
      break;
    case '*':
      n = n1 * n2;
      d = d1 * d2;
      break;
    case '/':
      n = n1 * d2;
      d = d1 * n2;
      break;
    default:
      return aStr;
  }
  if (d === 0) return aStr;
  let g = gcd(Math.abs(n), Math.abs(d));
  n /= g;
  d /= g;
  if (d < 0) {
    n = -n;
    d = -d;
  }
  return d === 1 ? `${n}` : `${n}/${d}`;
};
class MockSocket {
  constructor() {
    this.handlers = {};
    if (!window.__mockDb) window.__mockDb = {
      rooms: {}
    };
  }
  on(event, handler) {
    this.handlers[event] = handler;
  }
  off(event) {
    delete this.handlers[event];
  }
  emit(event, data, ack) {
    // createRoom のように「コールバックを第1引数」で渡された場合に対応
    if (typeof data === 'function' && ack === undefined) {
      ack = data;
      data = {};
    }
    setTimeout(() => {
      const db = window.__mockDb;
      const broadcastState = roomId => {
        const room = db.rooms[roomId];
        if (room && this.handlers['state']) {
          this.handlers['state']({
            roomId: room.id,
            players: room.players,
            teams: room.teams,
            timeline: room.timeline || []
          });
        }
      };
      const saveHistory = room => {
        room.history.push(JSON.parse(JSON.stringify({
          players: room.players,
          teams: room.teams
        })));
        if (room.history.length > 50) room.history.shift();
      };
      const pushTimeline = room => {
        const scores = {};
        room.players.forEach(p => scores[p.id] = p.score);
        if (!room.timeline) room.timeline = [];
        room.timeline.push({
          t: Date.now(),
          scores
        });
      };
      try {
        if (event === 'createRoom') {
          const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
          const hostToken = Math.random().toString(36).substring(2);
          db.rooms[roomId] = {
            id: roomId,
            hostToken,
            players: [],
            teams: [],
            history: [],
            timeline: []
          };
          pushTimeline(db.rooms[roomId]);
          if (ack) ack({
            ok: true,
            roomId,
            hostToken
          });
        } else if (event === 'hostJoin') {
          const room = db.rooms[data.roomId];
          if (room && room.hostToken === data.hostToken) {
            if (ack) ack({
              ok: true,
              state: {
                roomId: room.id,
                players: room.players,
                teams: room.teams,
                timeline: room.timeline
              }
            });
            broadcastState(room.id);
          } else if (ack) ack({
            ok: false,
            error: 'unauthorized'
          });
        } else if (event === 'joinRoom') {
          const room = db.rooms[data.roomId];
          if (!room) {
            if (ack) ack({
              ok: false,
              error: 'room_not_found'
            });
            return;
          }
          let player = room.players.find(p => p.id === data.playerId);
          if (!player) {
            player = {
              id: Math.random().toString(36).substring(2),
              name: data.name,
              score: "0",
              teamId: null
            };
            room.players.push(player);
            pushTimeline(room);
          } else {
            player.name = data.name;
          }
          if (ack) ack({
            ok: true,
            playerId: player.id,
            state: {
              roomId: room.id,
              players: room.players,
              teams: room.teams,
              timeline: room.timeline
            }
          });
          broadcastState(room.id);
        } else if (event === 'op') {
          const room = db.rooms[data.roomId];
          if (!room || room.hostToken !== data.hostToken) {
            if (ack) ack({
              ok: false,
              error: 'unauthorized'
            });
            return;
          }
          saveHistory(room);
          const {
            type,
            payload
          } = data;
          if (type === 'score') {
            const p = room.players.find(p => p.id === payload.playerId);
            if (p) p.score = evalFrac(payload.operator, p.score, payload.valueStr);
          } else if (type === 'setAll') {
            room.players.forEach(p => p.score = payload.valueStr);
          } else if (type === 'resetAll') {
            room.players.forEach(p => p.score = "0");
          } else if (type === 'undo') {
            if (room.history.length > 0) {
              const prev = room.history.pop();
              room.players = prev.players;
              room.teams = prev.teams;
            }
          } else if (type === 'createTeam') {
            room.teams.push({
              id: Math.random().toString(36).substring(2),
              name: payload.name
            });
          } else if (type === 'assignTeam') {
            const p = room.players.find(p => p.id === payload.playerId);
            if (p) p.teamId = payload.teamId;
          } else if (type === 'removePlayer') {
            room.players = room.players.filter(p => p.id !== payload.playerId);
          }
          if (type !== 'undo') pushTimeline(room);
          broadcastState(room.id);
          if (ack) ack({
            ok: true
          });
        }
      } catch (e) {
        if (ack) ack({
          ok: false,
          error: e.message
        });
      }
    }, 10);
  }
}

// ---- 有理数（分数）演算：得点を厳密に保持 ----
const _gcd = (a, b) => {
  a = a < 0n ? -a : a;
  b = b < 0n ? -b : b;
  while (b) {
    [a, b] = [b, a % b];
  }
  return a;
};
const _rMake = (n, d) => {
  if (d === 0n) return null;
  if (d < 0n) {
    n = -n;
    d = -d;
  }
  if (n === 0n) return "0/1";
  const g = _gcd(n, d) || 1n;
  return `${n / g}/${d / g}`;
};
const _rParse = s => {
  const [a, b] = String(s == null ? "0" : s).split('/');
  return {
    n: BigInt(a || "0"),
    d: b === undefined ? 1n : BigInt(b)
  };
};
const _decToRat = s => {
  if (!/^[+-]?(\d+(\.\d+)?|\.\d+)$/.test(s)) return null;
  let sign = 1n;
  if (s[0] === '+') s = s.slice(1);else if (s[0] === '-') {
    sign = -1n;
    s = s.slice(1);
  }
  if (s.indexOf('.') >= 0) {
    const [i, f] = s.split('.');
    return {
      n: BigInt((i || '0') + f) * sign,
      d: 10n ** BigInt(f.length)
    };
  }
  return {
    n: BigInt(s) * sign,
    d: 1n
  };
};
const parseValue = input => {
  if (input == null) return null;
  let s = String(input).trim();
  if (s === '') return null;
  if (s.indexOf('/') >= 0) {
    const p = s.split('/');
    if (p.length !== 2) return null;
    const a = _decToRat(p[0].trim()),
      b = _decToRat(p[1].trim());
    if (!a || !b) return null;
    return _rMake(a.n * b.d, a.d * b.n);
  }
  const r = _decToRat(s);
  return r ? _rMake(r.n, r.d) : null;
};
const applyOp = (scoreStr, op, valStr) => {
  const a = _rParse(scoreStr || "0/1"),
    b = _rParse(valStr);
  let n, d;
  switch (op) {
    case '+':
      n = a.n * b.d + b.n * a.d;
      d = a.d * b.d;
      break;
    case '-':
      n = a.n * b.d - b.n * a.d;
      d = a.d * b.d;
      break;
    case '*':
      n = a.n * b.n;
      d = a.d * b.d;
      break;
    case '/':
      if (b.n === 0n) return scoreStr;
      n = a.n * b.d;
      d = a.d * b.n;
      break;
    default:
      return scoreStr;
  }
  return _rMake(n, d);
};

// ---- ID/コード生成 ----
const _clone = o => JSON.parse(JSON.stringify(o || {}));
const ROOM_CODE_LEN = 4;
const genRoomCode = () => {
  let s = '';
  for (let i = 0; i < ROOM_CODE_LEN; i++) s += Math.floor(Math.random() * 10);
  return s;
};
const genToken = () => Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
const genId = p => p + '_' + Math.random().toString(36).slice(2, 10);

// ==========================================
// Firebase 版「ソケット」：既存の emit/on インターフェースを踏襲
// ==========================================
class FirebaseSocket {
  constructor() {
    this.handlers = {};
    this.history = [];
    this.latestVal = {};
    this.roomId = null;
    this._connected = false;
    this._subRef = null;
    this._sub = null;
    this.db = getDb();
    if (this.db) {
      this.db.ref('.info/connected').on('value', s => {
        this._connected = !!s.val();
        const h = this.handlers[this._connected ? 'connect' : 'disconnect'];
        if (h) h();
      });
    }
  }
  on(e, h) {
    this.handlers[e] = h;
    if (e === 'connect' && this._connected) h();
  }
  off(e) {
    delete this.handlers[e];
  }
  _stateObj() {
    const v = this.latestVal || {};
    return {
      roomId: this.roomId,
      players: Object.values(v.players || {}),
      teams: Object.values(v.teams || {}),
      teamMode: v.teamMode || 'product',
      guestScoring: !!v.guestScoring,
      scoreMode: v.scoreMode || 'addsub',
      timeline: Object.values(v.timeline || {}).sort((a, b) => a.t - b.t)
    };
  }
  _emitState() {
    const h = this.handlers['state'];
    if (h) h(this._stateObj());
  }
  _subscribe(roomId) {
    if (this.roomId === roomId && this._sub) return;
    if (this._sub && this._subRef) this._subRef.off('value', this._sub);
    this.roomId = roomId;
    this._subRef = this.db.ref('rooms/' + roomId);
    this._sub = this._subRef.on('value', s => {
      this.latestVal = s.val() || {};
      this._emitState();
    });
  }
  leaveRoom() {
    if (this._sub && this._subRef) this._subRef.off('value', this._sub);
    this._sub = null;
    this._subRef = null;
    this.roomId = null;
    this.latestVal = {};
  }
  emit(event, data, ack) {
    if (typeof data === 'function' && ack === undefined) {
      ack = data;
      data = {};
    }
    data = data || {};
    const A = x => {
      if (typeof ack === 'function') ack(x);
    };
    if (!this.db) {
      A({
        ok: false,
        error: 'firebase_not_configured'
      });
      return;
    }
    try {
      if (event === 'createRoom') {
        const hostToken = genToken();
        const ROOM_TTL = 24 * 60 * 60 * 1000; // 24h 経過した部屋は自動削除
        const finish = roomId => {
          this.db.ref('rooms/' + roomId).set({
            hostToken,
            createdAt: Date.now(),
            players: {},
            teams: {},
            timeline: {}
          }).then(() => A({
            ok: true,
            roomId,
            hostToken
          })).catch(e => A({
            ok: false,
            error: e.message
          }));
        };
        this.db.ref('rooms').get().then(s => {
          const all = s.val() || {};
          const now = Date.now();
          const used = new Set();
          Object.keys(all).forEach(code => {
            const r = all[code];
            if (r && r.createdAt && now - r.createdAt > ROOM_TTL) {
              this.db.ref('rooms/' + code).remove();
              this.db.ref('history/' + code).remove();
            } else {
              used.add(code);
            }
          });
          let roomId,
            attempt = 0;
          do {
            roomId = genRoomCode();
            attempt++;
          } while (used.has(roomId) && attempt < 200);
          finish(roomId);
        }).catch(() => finish(genRoomCode()));
      } else if (event === 'checkRoom') {
        this.db.ref('rooms/' + data.roomId).get().then(s => A({
          ok: s.exists()
        })).catch(() => A({
          ok: false
        }));
      } else if (event === 'hostJoin') {
        const ref = this.db.ref('rooms/' + data.roomId);
        ref.get().then(s => {
          if (!s.exists()) {
            // サーバ側の状態が無くてもホストのトークンで同じコードを復元
            return ref.set({
              hostToken: data.hostToken,
              createdAt: Date.now(),
              players: {},
              teams: {},
              timeline: {}
            }).then(() => {
              this._subscribe(data.roomId);
              A({
                ok: true,
                state: {
                  roomId: data.roomId,
                  players: [],
                  teams: [],
                  timeline: []
                }
              });
            });
          }
          const v = s.val();
          if (v.hostToken !== data.hostToken) {
            A({
              ok: false,
              error: 'unauthorized'
            });
            return;
          }
          this._subscribe(data.roomId);
          A({
            ok: true,
            state: this._stateFromVal(data.roomId, v)
          });
        }).catch(e => A({
          ok: false,
          error: e.message
        }));
      } else if (event === 'joinRoom') {
        const ref = this.db.ref('rooms/' + data.roomId);
        ref.get().then(s => {
          if (!s.exists()) {
            A({
              ok: false,
              error: 'room_not_found'
            });
            return;
          }
          const v = s.val();
          const name = (data.name || '').trim().slice(0, 30);
          if (!name) {
            A({
              ok: false,
              error: 'invalid_name'
            });
            return;
          }
          let pid = data.playerId;
          const existing = pid && v.players && v.players[pid];
          if (!existing) pid = genId('p');
          const playerObj = existing ? Object.assign({}, v.players[pid], {
            name
          }) : {
            id: pid,
            name,
            score: '0/1',
            maru: 0,
            batsu: 0,
            teamId: null,
            joinedAt: Date.now()
          };
          ref.child('players/' + pid).set(playerObj).then(() => {
            this._subscribe(data.roomId);
            const merged = Object.assign({}, v.players || {});
            merged[pid] = playerObj;
            A({
              ok: true,
              playerId: pid,
              state: this._stateFromVal(data.roomId, Object.assign({}, v, {
                players: merged
              }))
            });
          }).catch(e => A({
            ok: false,
            error: e.message
          }));
        }).catch(e => A({
          ok: false,
          error: e.message
        }));
      } else if (event === 'op') {
        this._handleOp(data, A);
      }
    } catch (e) {
      A({
        ok: false,
        error: e.message
      });
    }
  }
  _stateFromVal(roomId, v) {
    return {
      roomId,
      players: Object.values(v.players || {}),
      teams: Object.values(v.teams || {}),
      teamMode: v.teamMode || 'product',
      guestScoring: !!v.guestScoring,
      scoreMode: v.scoreMode || 'addsub',
      timeline: Object.values(v.timeline || {}).sort((a, b) => a.t - b.t)
    };
  }
  _pushHistory(roomId) {
    this.db.ref('history/' + roomId).push({
      players: _clone(this.latestVal.players),
      teams: _clone(this.latestVal.teams)
    });
  }
  _handleOp(data, A) {
    const {
      type,
      payload = {}
    } = data;
    const ref = this.db.ref('rooms/' + data.roomId);
    const players = _clone(this.latestVal.players);
    const simple = (this.latestVal.scoreMode || 'addsub') === 'simple';
    const appendTimeline = pmap => {
      const scores = {};
      Object.values(pmap || {}).forEach(p => {
        scores[p.id] = simple ? String((p.maru || 0) - (p.batsu || 0)) : p.score;
      });
      ref.child('timeline').push({
        t: Date.now(),
        scores
      });
    };
    try {
      if (type === 'maru' || type === 'batsu') {
        const p = players[payload.playerId];
        if (!p) {
          A({
            ok: false,
            error: 'player_not_found'
          });
          return;
        }
        this._pushHistory(data.roomId);
        p[type] = (p[type] || 0) + 1;
        ref.child('players').set(players);
        appendTimeline(players);
        A({
          ok: true
        });
      } else if (type === 'setScoreMode') {
        ref.child('scoreMode').set(payload.mode === 'simple' ? 'simple' : 'addsub');
        A({
          ok: true
        });
      } else if (type === 'score') {
        const p = players[payload.playerId];
        if (!p) {
          A({
            ok: false,
            error: 'player_not_found'
          });
          return;
        }
        const val = parseValue(payload.valueStr);
        if (val === null) {
          A({
            ok: false,
            error: 'invalid_value'
          });
          return;
        }
        this._pushHistory(data.roomId);
        p.score = applyOp(p.score, payload.operator, val);
        ref.child('players').set(players);
        appendTimeline(players);
        A({
          ok: true
        });
      } else if (type === 'setScore') {
        const p = players[payload.playerId];
        if (!p) {
          A({
            ok: false,
            error: 'player_not_found'
          });
          return;
        }
        const val = parseValue(payload.valueStr);
        if (val === null) {
          A({
            ok: false,
            error: 'invalid_value'
          });
          return;
